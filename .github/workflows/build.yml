name: Build Plugin and Sync Docs

permissions:
  contents: write

on:
  push:
    branches: 
      - main
      - SmallerImages
    tags: [ 'v*' ]
  pull_request:
    branches: 
      - main
      - SmallerImages

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          java-version: '25'

      - name: Build with Gradle
        run: ./gradlew shadowJar

      - name: Run Tests
        run: ./gradlew test

      - name: Upload Core Mod Artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-jar
          path: core/build/libs/*.jar

      - name: Upload API Artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-jar
          path: api/build/libs/*.jar

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    outputs:
      release_body: ${{ steps.create_release.outputs.body }}
    steps:
      - name: Download Core Artifact
        uses: actions/download-artifact@v4
        with:
          name: core-jar
          path: release-artifacts

      - name: Download API Artifact
        uses: actions/download-artifact@v4
        with:
          name: api-jar
          path: release-artifacts

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: release-artifacts/*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-notes:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout Docs Repo
        uses: actions/checkout@v4
        with:
          repository: rm20killer/Anglers-Almanac-Doc
          token: ${{ secrets.DOC_REPO_PAT }}
          path: docs-repo

      - name: Create Release Note File
        run: |
          # Extract tag name (e.g., 1.0.1 from v1.0.1)
          RAW_TAG=${{ github.ref_name }}
          TAG_NAME=${RAW_TAG#v}
          
          RELEASE_DATE=$(date +%Y-%m-%d)
          
          # Use the body generated by the 'release' job
          # Note: We use a heredoc to handle multi-line strings safely
          cat <<EOF > docs-repo/content/ReleaseNotes/${TAG_NAME}.md
          ---
          draft: true
          date: ${RELEASE_DATE}
          tags:
            - PatchNotes
          ---

          ${{ needs.release.outputs.release_body }}
          EOF

      - name: Commit and Push
        run: |
          cd docs-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/ReleaseNotes/
          git commit -m "Add release notes for ${{ github.ref_name }}"
          git push
